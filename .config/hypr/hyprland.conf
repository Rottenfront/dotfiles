monitor=,3440x1440@100,auto,1

# ── Autostart ──
exec-once = env QT_MEDIA_BACKEND=ffmpeg qs
exec-once = awww-daemon
exec-once = waybar
exec-once = /usr/lib/mate-polkit/polkit-mate-authentication-agent-1
exec-once = gsettings set org.gnome.desktop.interface color-scheme prefer-dark
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'MacTahoe-Dark'
exec-once = ~/.config/quickshell/wave-check.sh

# ── Environment ──
env = QT_QPA_PLATFORM,wayland
env = SDL_VIDEODRIVER,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = PROTON_ENABLE_WAYLAND,1

env = XCURSOR_SIZE,24
env = GTK_THEME,MacTahoe-Dark
env = QT_STYLE_OVERRIDE,kvantum

# Permissions

permission = /usr/(bin|local/bin)/flameshot, screencopy, allow
permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

# ── Input ──
input {
    kb_layout = us,ru
    kb_variant = colemak,
    kb_options = grp:caps_toggle,grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# ── General ──
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 1
    col.active_border = rgba(c8b89aee)
    col.inactive_border = rgba(1a1814aa)
    layout = dwindle
}

# ── Decoration ──
decoration {
    rounding = 0
    blur {
        enabled = false
    }
    shadow {
        enabled = false
    }
}

# ── Animations ──
animations {
    enabled = no
    bezier = niercurve, 0.4, 0, 0.2, 1
    animation = windows,      1, 4, niercurve, slide
    animation = windowsOut,   1, 3, niercurve, slide
    animation = fade,         1, 4, niercurve
    animation = workspaces,   1, 5, niercurve, slidevert
}

# ── Layout dwindle ──
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Layout master ──
master {
    new_status = master
    mfact = 0.5
}

# ══════════════════════════════════════════════════
# Bindings
# ══════════════════════════════════════════════════

# ── Launcher (menu applications) ──
# bindr = SUPER, C, exec, echo t >> /tmp/qs-menu
bind = SUPER, C, exec, echo t >> /tmp/qs-menu

# ── Player Quickshell ──
bind = SUPER, Return,       exec, echo t >> /tmp/qs-toggle
bind = SUPER SHIFT, Return, exec, echo t >> /tmp/qs-front

# ── Applications ──
bind = SUPER SHIFT, B, exec, zen-browser
bind = SUPER SHIFT, I, exec, helium-browser
bind = SUPER SHIFT, P, exec, pwvucontrol
bind = SUPER SHIFT, G, exec, strawberry
bind = SUPER SHIFT, N, exec, throne
bind = SUPER SHIFT, U, exec, Telegram & vesktop --proxy-server="http://127.0.0.1:2080"
bind = SUPER, D, exec, thunar
bind = SUPER SHIFT, T, exec, ghostty
bind = SUPER, M, exec, pgrep -x spotify >/dev/null && hyprctl dispatch togglespecialworkspace spotify || spotify
bind = SUPER, R, exec, pkill qs
bind = SUPER, P, exec, ~/.config/quickshell/wallpaper.sh


bind = SUPER SHIFT, C, killactive
# bind = SUPER, F,       fullscreen
bind = SUPER, T,       togglefloating
# bind = SUPER, D,       fullscreen, 1
# bind = SUPER, W,       exec, hyprctl keyword general:layout master
# bind = SUPER SHIFT, W, exec, hyprctl keyword general:layout dwindle

# ── Focus ──
bind = SUPER,       Tab, cyclenext
bind = SUPER SHIFT, Tab, cyclenext, prev

# ── Directed focus ──
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# ── Window movement ──
bind = SUPER SHIFT, left,  movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up,    movewindow, u
bind = SUPER SHIFT, down,  movewindow, d
bind = SUPER SHIFT, H, movewindow, l
bind = SUPER SHIFT, L, movewindow, r
bind = SUPER SHIFT, K, movewindow, u
bind = SUPER SHIFT, J, movewindow, d

# ── Special workspace ──
bind = SUPER SHIFT, D, movetoworkspace, special:magic
bind = SUPER,       D, togglespecialworkspace, magic

# ── Workspaces ──
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# ── Move window to workspace ──
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# ── Scroll workspaces ──
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up,   workspace, e-1

# ── Mouse bindings ──
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# ── Screen capture ──
bind = SUPER SHIFT, S, exec, flameshot gui
bind = , Print, exec, grim -g "$(slurp)" ~/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Multimedia keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Window rules
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = thunar-file-progress
    match:title = File Operation Progress
    float = yes
}

windowrule {
    name = thunar-rename
    match:title = Rename .*
    float = yes
}

windowrule {
    name = Open
    match:title = (Open Folder)|(Open File)|(Open Files)
    float = yes
}

windowrule {
    name = Picture-in-Picture
    match:title = Picture-in-Picture
    float = yes
}

windowrule {
    name = portproton
    match:class = PortProton
    float = yes
}

# ── Rules for quickshell ──
windowrule = float on,     match:class ^(quickshell)$
windowrule = pin on,       match:class ^(quickshell)$
windowrule = no_blur on,   match:class ^(quickshell)$
windowrule = no_shadow on, match:class ^(quickshell)$

windowrule = float on,     match:class ^(flameshot)$
windowrule = no_blur on,   match:class ^(flameshot)$
windowrule = no_shadow on, match:class ^(flameshot)$

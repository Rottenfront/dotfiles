# ══════════════════════════════════════════════
# hyprlock.conf — NieR cassette futurism
# Automatic keyboard focus (handled by hyprlock)
# Dynamic username via $USER
# ══════════════════════════════════════════════

general {
    disable_loading_bar    = true
    hide_cursor            = true
    grace                  = 0
    no_fade_in             = false
    no_fade_out            = false
    ignore_empty_input     = false
    text_trim              = true
}

# ── Background: dark sepia base color ──
# The pixel wave animation is generated as wallpaper
# via the lock-bg.sh script launched before hyprlock
background {
    monitor     =
    path        = ~/.config/hypr/lockbg.png   # generated by lock.sh
    blur_size   = 0
    blur_passes = 0
    brightness  = 1.0
    contrast    = 1.0
    vibrancy    = 0.0
    color       = rgba(11, 9, 6, 1.0)         # fallback if no image
}

# ── Input field — centered, NieR style ──
input-field {
    monitor         =
    size            = 320, 42
    position        = 0, -60
    halign          = center
    valign          = center

    # Style
    outline_thickness    = 1
    dots_size            = 0.25
    dots_spacing         = 0.20
    dots_center          = true
    dots_rounding        = -1       # square like the design
    outer_color          = rgba(70, 63, 46, 180)
    inner_color          = rgba(214, 207, 181, 12)
    font_color           = rgba(70, 63, 46, 255)
    fade_on_empty        = false
    placeholder_text     = <span foreground="##7a7358" style="italic">password...</span>
    hide_input           = false
    rounding             = 0        # no rounding — NieR design
    check_color          = rgba(110, 42, 42, 255)
    fail_color           = rgba(110, 42, 42, 255)
    fail_text            = <span foreground="##6e2a2a">AUTHENTICATION FAILED</span>
    fail_transition      = 300
    numlock_color        = -1
    capslock_color       = -1
    bothlock_color       = -1
    invert_numlock       = false
    swap_font_color      = false

    # Immediate focus on launch
    # hyprlock handles keyboard focus automatically
    # — no need for WlrKeyboardFocus or forceActiveFocus
}

# ── Avatar / User icon ──
image {
    monitor  =
    path     = /usr/share/icons/hicolor/96x96/apps/user-home.png
    size     = 64
    rounding = 0
    position = 0, 120
    halign   = center
    valign   = center
    opacity  = 0.0    # invisible — only using text labels
}

# ── Dynamic USERNAME ──
label {
    monitor   =
    text      = cmd[update:0] echo "$USER" | tr '[:lower:]' '[:upper:]'
    color     = rgba(70, 63, 46, 255)
    font_size = 13
    font_family = Share Tech Mono
    position  = 0, 80
    halign    = center
    valign    = center
    shadow_passes = 0
}

# ── Japanese subtitle ──
label {
    monitor     =
    text        = ユニット · アクティブ
    color       = rgba(122, 115, 88, 200)
    font_size   = 9
    font_family = Noto Sans JP
    position    = 0, 60
    halign      = center
    valign      = center
    shadow_passes = 0
}

# ── Clock ──
label {
    monitor     =
    text        = $TIME
    color       = rgba(70, 63, 46, 255)
    font_size   = 46
    font_family = Share Tech Mono
    position    = 0, 20
    halign      = center
    valign      = center
    shadow_passes = 0
}

# ── Date ──
label {
    monitor     =
    text        = cmd[update:1000] date '+%Y / %m / %d'
    color       = rgba(122, 115, 88, 200)
    font_size   = 9
    font_family = Share Tech Mono
    position    = 0, -4
    halign      = center
    valign      = center
    shadow_passes = 0
}

# ── Top left corner ──
label {
    monitor     =
    text        = cmd[update:0] printf "SESSION LOCKED\nNODE · $USER@$HOSTNAME"
    color       = rgba(70, 63, 46, 220)
    font_size   = 9
    font_family = Share Tech Mono
    position    = 30, -30
    halign      = left
    valign      = top
    shadow_passes = 0
}

# ── Top right corner — time + info ──
label {
    monitor     =
    text        = $TIME
    color       = rgba(70, 63, 46, 220)
    font_size   = 9
    font_family = Share Tech Mono
    position    = -30, -30
    halign      = right
    valign      = top
    shadow_passes = 0
}

# ── Bottom left corner ──
label {
    monitor     =
    text        = cmd[update:0] printf "KERNEL $(uname -r | cut -d- -f1)\nWM · hyprland"
    color       = rgba(70, 63, 46, 200)
    font_size   = 9
    font_family = Share Tech Mono
    position    = 30, 30
    halign      = left
    valign      = bottom
    shadow_passes = 0
}

# ── Bottom right corner ──
label {
    monitor     =
    text        = cmd[update:0] printf "ARCH LINUX\n$(lspci | grep -i 'vga\|3d' | head -1 | sed 's/.*\[\(.*\)\].*/\1/' | cut -c1-16)"
    color       = rgba(70, 63, 46, 200)
    font_size   = 9
    font_family = Share Tech Mono
    position    = -30, 30
    halign      = right
    valign      = bottom
    shadow_passes = 0
}

# ── Bottom ticker ──
label {
    monitor     =
    text        = SYSTEM SCAN · OK  ▸  MEMORY INTEGRITY · VERIFIED  ▸  SESSION LOCKED · SECURE  ▸  NETWORK UPLINK · STABLE  ▸
    color       = rgba(70, 63, 46, 160)
    font_size   = 8
    font_family = Share Tech Mono
    position    = 0, 50
    halign      = center
    valign      = bottom
    shadow_passes = 0
}

# See this wiki page for more info:
# https://github.com/dylanaraps/neofetch/wiki/Customizing-Info

# I used custom seperators as the older one looked not very properly proportioned

print_info() {
    prin " вҖӢ вҖӢ  вҖӢ вҖӢ~~~ ${cl2}Eat${cl0} пғҙ , ${cl4}Sleep${cl0} пҲ¶ , ${cl6}Linux${cl0} оң’ . ~~~"
    prin "$(color 1)в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n Hardware Information \nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ"
    info " вҖӢ вҖӢ MOD " model
    info " вҖӢ вҖӢ CPU " cpu
    info " вҖӢ вҖӢ GPUп¬ҷ " gpu
#   info " вҖӢ вҖӢ пӮ  " disk
   info " вҖӢ вҖӢ RAM " memory
#   info " вҖӢ вҖӢ пЎё " resolution
#    info " вҖӢ вҖӢ уұҲ‘ " battery
    prin "$(color 1)в”ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n Software Information \nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Ө"
    info " вҖӢ вҖӢ пҖҮ " users
    info " вҖӢ вҖӢ пҢғ " distro
# Just get your distro's logo off nerdfonts.com
    info " вҖӢ вҖӢ оң’ " kernel
    info " вҖӢ вҖӢ оҲј " de
    info " вҖӢ вҖӢ п’Ҳ " wm
    info " вҖӢ вҖӢ п’ү " shell
    info " вҖӢ вҖӢ оһ• " term
#   info " вҖӢ вҖӢ пҖұ " term_font
#    info " вҖӢ вҖӢ в”Ӯ пҖұ " font
#    info " вҖӢ вҖӢ  пқ» " theme
#    info " вҖӢ вҖӢ  п”ә " icons
#   info " вҖӢ вҖӢ пһҹ " packages
    info " вҖӢ вҖӢ  up" uptime
#   info " вҖӢ вҖӢ  пӮ… " gpu_driver  # Linux/macOS only
    info " вҖӢ вҖӢ пӮ… " cpu_usage
#    info " вҖӢ вҖӢ пұҳ " song
 #    [[ "$player" ]] && prin "Music Player" "$player"
#    info " вҖӢ вҖӢ  пҮ« " local_ip
#    info " вҖӢ вҖӢ  пҮ« " public_ip
#    info " вҖӢ вҖӢ  п‘җ " locale  # This only works on glibc systems.
    prin "$(color 1)в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ\n Colors \nв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ"
    info cols
prin " \n \n $(color 1)1 \n \n $(color 2)2 \n \n $(color 3)3 \n \n $(color 4)4  \n \n $(color 5)5  \n \n $(color 6)6  \n \n $(color 7)7  \n \n $(color 11)8  \n \n $(color 8)8  \n \n $(color 9)0"
}

kernel_shorthand="on"
distro_shorthand="off"
os_arch="off"
uptime_shorthand="on"
memory_percent="on"
package_managers="on"
shell_path="off"
shell_version="on"
speed_type="bios_limit"
speed_shorthand="on"
cpu_brand="off"
cpu_speed="off"
cpu_cores="logical"
cpu_temp="on"
gpu_brand="on"
gpu_type="all"
refresh_rate="on"
gtk_shorthand="on"
gtk2="on"
gtk3="on"
public_ip_host="http://ident.me"
public_ip_timeout=2
disk_show=('/home')
music_player="mpd"
song_format="%artist% - %title%"
song_shorthand="off"
colors=(distro)
bold="on"
underline_enabled="on"
underline_char="-"
separator=" п…ё "
color_blocks="off"
block_range=(0 15) # Colorblocks

# Colors for custom colorblocks
magenta="\033[1;35m"
green="\033[1;32m"
white="\033[1;37m"
blue="\033[1;34m"
red="\033[1;31m"
black="\033[1;40;30m"
yellow="\033[1;33m"
cyan="\033[1;36m"
reset="\033[0m"
bgyellow="\033[1;43;33m"
bgwhite="\033[1;47;37m"
cl0="${reset}"
cl1="${magenta}"
cl2="\033[38;5;205m"
cl3="${white}"
cl4="\033[38;5;11m"
cl5="${red}"
cl6="\033[38;5;33m"
cl7="${cyan}"
cl8="${black}"
cl9="${bgyellow}"
cl10="${bgwhite}"

block_width=4
block_height=1

bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

cpu_display="on"
memory_display="on"
battery_display="on"
disk_display="on"

aascii_distro="auto"
ascii_colors=(distro)
ascii_bold="on"

thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"
crop_mode="normal"
crop_offset="center"

gap=2

yoffset=0
xoffset=0

stdout="off"
